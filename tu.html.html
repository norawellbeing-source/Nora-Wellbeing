<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — Nora Holistic Wellbeing</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      background: #F5EFE6;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .inner { max-width: 500px; }
    img { height: 80px; margin-bottom: 2rem; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 2.5rem;
      color: #6B4F3A;
      margin-bottom: 1rem;
    }
    p { color: #9A8C82; line-height: 1.8; margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 0.8rem 2rem;
      border: 1px solid #6B4F3A;
      color: #6B4F3A;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    a:hover { background: #6B4F3A; color: #FAF7F2; }
  </style>
</head>
<body>
  <div class="inner">
    <img src="logo.png" alt="Nora"/>
    <h1>Thank you ✦</h1>
    <p>Your message has been received. I'll be in touch shortly to arrange your session.</p>
    <a href="index.html">Back to home</a>

</html>
